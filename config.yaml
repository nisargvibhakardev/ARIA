screen:
  interval_seconds: 3.0
  diff_threshold: 0.15
  monitor_index: 1
  enabled: false

mic:
  vad_aggressiveness: 2
  done_word: pineapple
  done_word_phoneme_tolerance: 2
  chunk_frames: 533
  eot_probability_threshold: 0.7
  eot_hard_cutoff_frames: 50
  confidence_gate_logprob: -0.8
  noise_speech_prob_max: 0.6

memory:
  rolling_days: 7
  context_window_seconds: 120
  ebbinghaus_purge_threshold: 0.2
  initial_stability_days: 1.0
  important_stability_days: 30.0

episodic:
  summary_interval_minutes: 30

llm:
  model: aria-qwen
  keep_alive: 10m
  response_language: english
  num_predict: 80
  format_json: true
  primer_enabled: true
  primer_divergence_threshold: 0.2

energy:
  min_interval_seconds: 20
  max_interval_seconds: 120

calibrator:
  min_samples: 50
  retrain_every: 10

idle_unload:
  ocr_minutes: 3.0
  whisper_minutes: 3.0
  tts_minutes: 2.0

whisper:
  model: tiny.en
  device: cpu
  compute_type: int8

hotkey: ctrl+shift+space

overlay:
  position: bottom-right
  auto_dismiss_seconds: 8

system:
  nice_level: 10
